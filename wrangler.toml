name = "idea-coding"
main = ".open-next/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Self-reference service binding (required for OpenNext caching).
# The service name must match the worker name above.
[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "idea-coding"

# R2 bucket for the incremental cache (Cache Components / ISR).
# Create before first deploy: wrangler r2 bucket create idea-coding-opennext-cache
[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "idea-coding-opennext-cache"

# KV namespace for the GitHub Trending weekly snapshot.
# Create before first deploy: wrangler kv namespace create TRENDING_KV
[[kv_namespaces]]
binding = "TRENDING_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Optional: cron trigger to refresh trending on a schedule (fallback if ISR
# revalidation doesn't fire reliably on Cloudflare). Runs every 6 hours.
[triggers]
crons = ["0 */6 * * *"]

# Production route — replace with your actual domain.
# routes = [{ pattern = "ideacoding.favorhub.top/*", custom_domain = true }]
